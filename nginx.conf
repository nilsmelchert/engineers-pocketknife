server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compress text assets on the fly.
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/manifest+json font/ttf font/woff2;

    # Hashed build assets (assets/*.js, *.css, fonts) never change → cache hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files  $uri =404;
    }

    # The service worker and its registration must always be revalidated so
    # clients pick up new deployments (vite-plugin-pwa, autoUpdate).
    location = /sw.js            { add_header Cache-Control "no-cache"; }
    location = /registerSW.js    { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }

    # SPA: hand every unknown path to index.html (HashRouter lives under /#/).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html itself must not be cached, or updates never reach users.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
